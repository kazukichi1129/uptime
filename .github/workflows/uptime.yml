name: Uptime CI
on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [trigger_uptime]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upptime
        uses: upptime/uptime-monitor@master
        with:
          UPPTIME_GH_PAT: ${{ secrets.UPPTIME_GH_PAT }}
        env:
          GH_PAT: ${{ secrets.UPPTIME_GH_PAT }}
